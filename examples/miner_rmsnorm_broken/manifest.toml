# Adversarial test bundle: an RMSNorm kernel that skips the normalization
# (computes x*weight instead of rmsnorm(x)*weight). It is faster and passes the
# scan + manifest, but wrecks the model. The quality gate MUST catch it.

bundle_id = "example-rmsnorm-broken"
abi_version = "optima-op-abi-v0"

[[ops]]
slot = "norm.rmsnorm"
source = "kernels/rmsnorm.py"
entry = "rmsnorm"
dtypes = ["bfloat16", "float16"]
architectures = ["sm80", "sm86", "sm89", "sm90", "sm100"]
metadata = "metadata/rmsnorm.json"
