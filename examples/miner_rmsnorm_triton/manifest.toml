# Example miner submission targeting the norm.rmsnorm slot with a Triton kernel.
# RMSNorm is universal, so this fires on GPT-OSS (whose activation is fused into
# the MoE kernel and never goes through SiluAndMul).

bundle_id = "example-rmsnorm-triton-v1"
abi_version = "optima-op-abi-v0"

[[ops]]
slot = "norm.rmsnorm"
source = "kernels/rmsnorm.py"
entry = "rmsnorm"
dtypes = ["bfloat16", "float16"]
architectures = ["sm80", "sm86", "sm89", "sm90", "sm100"]
metadata = "metadata/rmsnorm.json"
