# CPU/GPU dry-run bundle for the moe.fused_experts PREPARE+FORWARD slot. Two miner
# callables: `prepare` (weight layout, runs once at load) + `fused_experts` (forward,
# per step). prepare reorders w13 [gate;up]->[up;gate]; forward consumes it. Pure torch
# — exercises the (prepare, forward) mechanism; a real quantized submission would do the
# FP4/FP8 weight layout in prepare + a fused GEMM in forward.

bundle_id = "example-moe-fused-experts-torch"
abi_version = "optima-op-abi-v0"

[[ops]]
slot = "moe.fused_experts"
source = "kernels/moe.py"
entry = "fused_experts"
prepare = "prepare"
dtypes = ["float32", "bfloat16", "float16"]
metadata = "metadata/moe.json"
