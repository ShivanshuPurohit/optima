# Adversarial test bundle: a kernel that "optimizes" by dropping the SiLU
# nonlinearity (computes gate*up instead of silu(gate)*up). It is faster and
# passes the static scan + manifest, but wrecks the model's output. The KL gate
# MUST catch it. Used to prove the quality gate works end-to-end.

bundle_id = "example-silu-broken"
abi_version = "optima-op-abi-v0"

[[ops]]
slot = "activation.silu_and_mul"
source = "kernels/silu_and_mul.py"
entry = "silu_and_mul"
dtypes = ["bfloat16", "float16"]
architectures = ["sm80", "sm86", "sm89", "sm90", "sm100"]
metadata = "metadata/silu_and_mul.json"
