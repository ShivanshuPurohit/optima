# CPU dry-run bundle: a trivially-correct pure-torch implementation of the
# activation.silu_and_mul slot. Its only purpose is to exercise the full
# pipeline (manifest -> scan -> load -> op-correctness) on a machine without a
# GPU or Triton. Not a real competitive submission.

bundle_id = "example-silu-torch-cpu"
abi_version = "optima-op-abi-v0"

[[ops]]
slot = "activation.silu_and_mul"
source = "kernels/silu_and_mul.py"
entry = "silu_and_mul"
dtypes = ["float32", "bfloat16", "float16"]
metadata = "metadata/silu_and_mul.json"
